# =============================================================
# Soustružník DB – Netlify konfigurace
# =============================================================

# SPA routing – všechny cesty přesměruje na index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# =============================================================
# Firebase env proměnné pro Netlify deploy
# =============================================================
# Nastavte v: Netlify UI → Site settings → Environment variables
# Nebo přes Netlify CLI:
#   netlify env:set VITE_FIREBASE_API_KEY            "AIza..."
#   netlify env:set VITE_FIREBASE_AUTH_DOMAIN        "vas-projekt.firebaseapp.com"
#   netlify env:set VITE_FIREBASE_PROJECT_ID         "vas-projekt"
#   netlify env:set VITE_FIREBASE_STORAGE_BUCKET     "vas-projekt.appspot.com"
#   netlify env:set VITE_FIREBASE_MESSAGING_SENDER_ID "123456789"
#   netlify env:set VITE_FIREBASE_APP_ID             "1:123:web:abc"
#
# Lokální vývoj: zkopírujte .env.example → .env.local a vyplňte hodnoty
# =============================================================
